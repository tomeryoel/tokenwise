# MomiHelm core application stack.
# Day 9 Langfuse runs through the opt-in docker-compose.langfuse.yml override.

services:
  guardrails-service:
    build: ./services/guardrails-service
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  rag-cache-service:
    build: ./services/rag-cache-service
    expose:
      - "8000"
    environment:
      # Semantic cache config. Chroma + HF model cache both live under /app/data
      # so a single named volume gives persistence across restarts and avoids
      # re-downloading the embedding model every time.
      - CACHE_SIMILARITY_THRESHOLD=0.88
      - CHROMA_DIR=/app/data/chroma
      - HF_HOME=/app/data/hf
      - TOKENIZERS_PARALLELISM=false
      # The HF Xet transfer backend can stall in some networks; force plain HTTPS
      # downloads and disable telemetry for a reliable first model fetch.
      - HF_HUB_DISABLE_XET=1
      - HF_HUB_DISABLE_TELEMETRY=1
    volumes:
      - rag_cache_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  image-analyser-service:
    build: ./services/image-analyser-service
    expose:
      - "8000"
    volumes:
      - image_model_data:/root/.cache/torch
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  optimizer-service:
    build: ./services/optimizer-service
    expose:
      - "8000"
    environment:
      # Layer 4 provider configuration (Ollama local + optional OpenAI).
      # host.docker.internal reaches native macOS/Windows Ollama from the container.
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_LOCAL_MODEL=${OLLAMA_LOCAL_MODEL:-llama3.1:latest}
      - OLLAMA_CHEAP_MODEL=${OLLAMA_CHEAP_MODEL:-llama3.1:latest}
      - OLLAMA_BALANCED_MODEL=${OLLAMA_BALANCED_MODEL:-llama3.1:latest}
      - OLLAMA_REQUEST_TIMEOUT_SECONDS=${OLLAMA_REQUEST_TIMEOUT_SECONDS:-120}
      - ENABLE_OPENAI_PROVIDER=${ENABLE_OPENAI_PROVIDER:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_CHEAP_MODEL=${OPENAI_CHEAP_MODEL:-}
      - OPENAI_BALANCED_MODEL=${OPENAI_BALANCED_MODEL:-}
      - OPENAI_PREMIUM_MODEL=${OPENAI_PREMIUM_MODEL:-}
      - OPENAI_REQUEST_TIMEOUT_SECONDS=${OPENAI_REQUEST_TIMEOUT_SECONDS:-60}
      - MODEL_PRICING_CONFIG_PATH=/app/config/model_pricing.json
      - USAGE_DB_PATH=/app/data/usage/tokenwise.db
    volumes:
      - usage_data:/app/data/usage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  n8n-init:
    image: n8nio/n8n:${N8N_VERSION:-2.31.5}
    user: node
    entrypoint: ["/bin/sh", "/workflows/bootstrap.sh"]
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n:/workflows:ro
    restart: "no"

  n8n:
    image: n8nio/n8n:${N8N_VERSION:-2.31.5}
    expose:
      - "5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_WEBHOOK_URL=http://n8n:5678/
      - N8N_PUBLIC_API_DISABLED=true
      - N8N_PUBLIC_API_SWAGGERUI_DISABLED=true
      - N8N_COMMUNITY_PACKAGES_ENABLED=false
      - N8N_VERIFIED_PACKAGES_ENABLED=false
      - N8N_UNVERIFIED_PACKAGES_ENABLED=false
      - N8N_TEMPLATES_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      # Preserve existing history, but do not retain payloads for new executions.
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_DATA_SAVE_ON_ERROR=none
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=false
      - EXECUTIONS_DATA_PRUNE=false
      - N8N_RUNNERS_TASK_TIMEOUT=300
      - N8N_COMPRESSION_NODE_MAX_DECOMPRESSED_SIZE_BYTES=268435456
      - N8N_COMPRESSION_NODE_MAX_ZIP_ENTRIES=1000
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      n8n-init:
        condition: service_completed_successfully
      guardrails-service:
        condition: service_healthy
      rag-cache-service:
        condition: service_healthy
      image-analyser-service:
        condition: service_healthy
      optimizer-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:5678/healthz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  gateway-service:
    build: ./services/gateway-service
    expose:
      - "8000"
    environment:
      - MOMIHELM_AUTH_DB_PATH=/app/data/auth/momihelm-auth.db
      - MOMIHELM_N8N_INTERNAL_URL=http://n8n:5678
      - MOMIHELM_SESSION_TTL_HOURS=${MOMIHELM_SESSION_TTL_HOURS:-12}
      - MOMIHELM_COOKIE_SECURE=${MOMIHELM_COOKIE_SECURE:-false}
      - MOMIHELM_ALLOWED_ORIGINS=${MOMIHELM_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      - MOMIHELM_MAX_PROMPT_CHARS=${MOMIHELM_MAX_PROMPT_CHARS:-100000}
      - MOMIHELM_MAX_IMAGE_BASE64_CHARS=${MOMIHELM_MAX_IMAGE_BASE64_CHARS:-7000000}
    volumes:
      - auth_data:/app/data/auth
    depends_on:
      n8n:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${MOMIHELM_HOST:-127.0.0.1}:${MOMIHELM_FRONTEND_PORT:-5173}:5173"
    depends_on:
      gateway-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:5173/healthz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  # --- One-off offline Ragas evaluation runner (profile: evaluation) ----------
  # NOT a persistent service. Only started on demand:
  #   docker compose --profile evaluation run --rm evaluation-runner --mode smoke
  #   docker compose --profile evaluation run --rm evaluation-runner --mode full
  # The host-side Python CLI (evaluation/README.md) is the primary validated path.
  evaluation-runner:
    build:
      context: .
      dockerfile: evaluation/Dockerfile
    profiles: ["evaluation"]
    environment:
      # Reach the other containers over the compose network + host Ollama.
      - TOKENWISE_WEBHOOK_URL=http://n8n:5678/webhook/tokenwise
      - TOKENWISE_N8N_HEALTH_URL=http://n8n:5678/healthz
      - TOKENWISE_OPTIMIZER_HEALTH_URL=http://optimizer-service:8000/providers/health
      - RAGAS_JUDGE_PROVIDER=ollama
      - RAGAS_JUDGE_MODEL=llama3.1:latest
      - RAGAS_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - TOKENWISE_BASELINE_MODEL=llama3.1:latest
      - RAGAS_EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - RAGAS_REQUEST_TIMEOUT_SECONDS=180
      - RAGAS_MAX_RETRIES=1
    volumes:
      # Persist experiment artifacts back to the host.
      - ./evaluation/results:/app/evaluation/results
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      n8n:
        condition: service_healthy
      optimizer-service:
        condition: service_healthy

  # One-off product-level release smoke test. It runs only when requested:
  #   docker compose --profile tools run --rm release-smoke
  release-smoke:
    image: python:3.11-slim
    profiles: ["tools"]
    environment:
      - MOMIHELM_WEBHOOK_URL=http://n8n:5678/webhook/tokenwise
      - MOMIHELM_USAGE_URL=http://n8n:5678/webhook/tokenwise-usage-summary
      - MOMIHELM_WORKFLOW_PATH=/workflows/tokenwise-skeleton.workflow.json
      - MOMIHELM_SMOKE_TIMEOUT_SECONDS=180
    volumes:
      - ./scripts:/scripts:ro
      - ./n8n:/workflows:ro
    command: ["python", "/scripts/smoke_test.py"]
    depends_on:
      n8n:
        condition: service_healthy

volumes:
  auth_data:
  n8n_data:
  rag_cache_data:
  image_model_data:
  usage_data:
