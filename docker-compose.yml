# TokenWise - walking skeleton (Day 1-2)
# Brings up: 4 FastAPI services, n8n orchestrator, React UI.
# Langfuse is intentionally left as a commented placeholder (Day 9).

services:
  guardrails-service:
    build: ./services/guardrails-service
    ports:
      - "8001:8000"
    restart: unless-stopped

  rag-cache-service:
    build: ./services/rag-cache-service
    ports:
      - "8002:8000"
    environment:
      # Semantic cache config. Chroma + HF model cache both live under /app/data
      # so a single named volume gives persistence across restarts and avoids
      # re-downloading the embedding model every time.
      - CACHE_SIMILARITY_THRESHOLD=0.88
      - CHROMA_DIR=/app/data/chroma
      - HF_HOME=/app/data/hf
      - TOKENIZERS_PARALLELISM=false
      # The HF Xet transfer backend can stall in some networks; force plain HTTPS
      # downloads and disable telemetry for a reliable first model fetch.
      - HF_HUB_DISABLE_XET=1
      - HF_HUB_DISABLE_TELEMETRY=1
    volumes:
      - rag_cache_data:/app/data
    restart: unless-stopped

  image-analyser-service:
    build: ./services/image-analyser-service
    ports:
      - "8003:8000"
    restart: unless-stopped

  optimizer-service:
    build: ./services/optimizer-service
    ports:
      - "8004:8000"
    environment:
      # Layer 4 provider configuration (Ollama local + optional OpenAI).
      # host.docker.internal reaches native Windows Ollama from the container.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_LOCAL_MODEL=llama3.1:latest
      - OLLAMA_CHEAP_MODEL=llama3.1:latest
      - OLLAMA_BALANCED_MODEL=llama3.1:latest
      - OLLAMA_REQUEST_TIMEOUT_SECONDS=120
      - ENABLE_OPENAI_PROVIDER=false
      - OPENAI_API_KEY=
      - OPENAI_BASE_URL=https://api.openai.com/v1
      - OPENAI_CHEAP_MODEL=
      - OPENAI_BALANCED_MODEL=
      - OPENAI_PREMIUM_MODEL=
      - OPENAI_REQUEST_TIMEOUT_SECONDS=60
      - MODEL_PRICING_CONFIG_PATH=/app/config/model_pricing.json
      - USAGE_DB_PATH=/app/data/usage/tokenwise.db
    volumes:
      - usage_data:/app/data/usage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    # Host port 5679 (not 5678) to avoid clashing with any other n8n already
    # running on the host. Inside the compose network n8n still listens on 5678.
    ports:
      - "5679:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_RUNNERS_ENABLED=true
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5679/
      # Allow the browser (React dev server) to call the webhook directly.
      - N8N_CORS_ALLOW_ORIGIN=*
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - guardrails-service
      - rag-cache-service
      - optimizer-service
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      # Browser talks to n8n on the host; empty/failed -> UI falls back to mock.
      - VITE_N8N_WEBHOOK_URL=http://localhost:5679/webhook/tokenwise
      - VITE_USAGE_SUMMARY_URL=http://localhost:5679/webhook/tokenwise-usage-summary
    depends_on:
      - n8n
    restart: unless-stopped

  # --- Langfuse placeholder (NOT enabled in the skeleton) ---------------------
  # Langfuse v3 needs Postgres + ClickHouse + Redis, which is too heavy for the
  # skeleton. It will be added on Day 9. Left here as documentation only.
  # langfuse:
  #   image: langfuse/langfuse:latest
  #   ports:
  #     - "3000:3000"

volumes:
  n8n_data:
  rag_cache_data:
  usage_data:
